{# Rules table for a profile. Expects: rules, moods, active_profile. #}
{% if rules %}
<article style="padding:0; overflow:hidden; margin-bottom:1.5rem;">
<table style="margin:0;">
  <thead>
    <tr>
      <th style="width:2.5rem;">On</th>
      <th>Label</th>
      <th>Condition</th>
      <th>Target mood</th>
      <th style="width:9.5rem;"></th>
    </tr>
  </thead>
  <tbody>
  {% for rule in rules %}
  {% include "partials/mood_rule_row.html" %}
  {% endfor %}
  </tbody>
</table>
</article>
{% else %}
<p style="color:var(--pico-muted-color); margin-bottom:1.5rem;">No rules defined yet for <strong>{{ active_profile }}</strong>. Add one below.</p>
{% endif %}
