{% set p = params|default({}) %}
<div style="display:flex; gap:0.75rem; flex-wrap:wrap; align-items:flex-end;">
  <label style="flex:1; min-width:130px; margin:0;">
    Mode
    <select name="params_mode" required>
      {% for m in ["work","social","informative","serious","flirting","creative","support"] %}
      <option value="{{ m }}" {% if m == p.get('mode') %}selected{% endif %}>{{ m }}</option>
      {% endfor %}
    </select>
  </label>
  <label style="width:110px; margin:0;">
    Min sessions
    <input type="number" name="params_min_count" value="{{ p.get('min_count', 2) }}" min="1" max="20" required>
  </label>
  <label style="width:110px; margin:0;">
    Look back
    <input type="number" name="params_lookback" value="{{ p.get('lookback', 5) }}" min="1" max="20" required>
  </label>
</div>
<label style="display:inline-flex; align-items:center; gap:0.5rem; margin:0.5rem 0 0; cursor:pointer; font-size:0.88rem;">
  <input type="checkbox" name="params_negate" value="1" {% if p.get('negate') %}checked{% endif %} style="width:1rem; height:1rem; margin:0;">
  Negate — match sessions <em>not</em> in this mode
</label>
<p style="margin:0.4rem 0 0; font-size:0.78rem; color:var(--pico-muted-color);">Fires when at least <em>min</em> of the last <em>lookback</em> sessions have (or lack, if negated) the selected mode.</p>
